<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070f">
<title>Sophia's Math Quest</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<canvas id="c"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-star">⭐</div>
    <h1 class="splash-title">Sophia's<br>Math Quest</h1>
    <p class="splash-sub">Touch the universe to begin ✨</p>
  </div>
</div>

<!-- STAGE SELECT -->
<div id="stageScreen" class="screen hidden">
  <header class="top-bar">
    <span class="player-name">⭐ Sophia</span>
    <span id="totalXp" class="xp-badge">0 XP</span>
  </header>
  <h2 class="section-title">Choose Your Quest</h2>
  <div id="stageGrid" class="stage-grid"></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hidden">
  <header class="top-bar">
    <button id="backBtn" class="icon-btn" aria-label="Back">←</button>
    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      <span id="qCounter" class="q-counter">1/10</span>
    </div>
    <span id="scoreDisplay" class="score-pill">0</span>
  </header>

  <div id="streakBanner" class="streak-banner hidden"></div>

  <div class="question-wrap">
    <div id="stageBadge" class="stage-badge"></div>
    <div id="stackDisplay" class="stack-display hidden"></div>
    <p id="questionText" class="question-text"></p>
    <div id="answerGrid" class="answer-grid"></div>
    <div id="hintBox" class="hint-box hidden"></div>
  </div>
</div>

<!-- STAGE COMPLETE -->
<div id="completeScreen" class="screen hidden">
  <div class="complete-inner">
    <div id="completeEmoji" class="complete-emoji"></div>
    <h2 id="completeTitle" class="complete-title"></h2>
    <div id="starsRow" class="stars-row"></div>
    <div class="complete-stats">
      <div class="stat-box"><span class="stat-num" id="statCorrect"></span><span class="stat-lbl">Correct</span></div>
      <div class="stat-box"><span class="stat-num" id="statXp"></span><span class="stat-lbl">XP Earned</span></div>
      <div class="stat-box"><span class="stat-num" id="statStreak"></span><span class="stat-lbl">Best Streak</span></div>
    </div>
    <button id="nextStageBtn" class="btn btn-primary">Next Quest →</button>
    <button id="retryBtn" class="btn btn-ghost">Try Again</button>
    <button id="homeBtn" class="btn btn-ghost">Quest Map</button>
  </div>
</div>

<script src="js/fluid.js"></script>
<script src="js/questions.js"></script>
<script src="js/game.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/niko/sophia/sw.js',{scope:'/niko/sophia/'});</script>
</body>
</html>
